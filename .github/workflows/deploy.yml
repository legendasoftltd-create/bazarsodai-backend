name: Deploy to Production

on:
  push:
    branches:
      - production

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/html/backend.bazaarsodai.com

            echo "==> Pulling latest code from production branch..."
            git fetch origin
            git reset --hard origin/production

            echo "==> Installing PHP dependencies..."
            php8.3 composer.phar install --no-dev --optimize-autoloader --no-interaction

            echo "==> Running database migrations..."
            php8.3 artisan migrate --force

            echo "==> Seeding chart of accounts and accounting rules..."
            php8.3 artisan db:seed --class="Modules\\Accounts\\Database\\Seeders\\ChartOfAccountsSeeder" --force
            php8.3 artisan db:seed --class="Modules\\Accounts\\Database\\Seeders\\AccountingRulesSeeder" --force

            echo "==> Caching config and clearing views/routes..."
            php8.3 artisan config:cache
            php8.3 artisan route:clear
            php8.3 artisan view:clear

            echo "==> Restarting queue workers..."
            php8.3 artisan queue:restart

            echo "==> Reloading PHP-FPM..."
            systemctl reload php8.3-fpm

            echo "==> Deploy complete."
